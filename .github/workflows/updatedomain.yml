- name: Commit and push changes to all branches
  run: |
    git config --global user.email "your-email@example.com"
    git config --global user.name "Your Name"

    git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
    
    git fetch --all
    BRANCHES=$(git branch -r | grep -v '\->' | sed 's/origin\///')

    for branch in $BRANCHES
    do
      echo "Processing branch: $branch"

      git checkout $branch 2>/dev/null || git checkout -b $branch origin/$branch

      git pull --rebase=interactive --autostash origin $branch || \
        (echo "Rebase fallito, tento un merge..." && git pull origin $branch --no-rebase)

      python update_domains.py

      if git diff --quiet config.json; then
        echo "No changes in config.json for branch $branch"
      else
        git add config.json
        git commit -m "Aggiornamento domini in config.json"
        git push origin $branch
      fi
    done
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
